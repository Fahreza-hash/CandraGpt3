<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login - AlterAi</title>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Alter<span>Ai</span></div>
    <div class="auth-sub">Login untuk mulai coding.</div>
    <div class="field"><label>Username</label><input type="text" id="username" placeholder="username kamu" autocomplete="username"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn-primary" id="btn">Masuk</button>
    <div class="auth-link">Belum punya akun? <a href="/register">Daftar</a></div>
  </div>
</div>
<footer class="credit-footer">Public Code by Yamzzdev &nbsp;·&nbsp; TikTok @ymzzzoff</footer>
<script src="/js/api.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
