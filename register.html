<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Register - AlterAi</title>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Alter<span>Ai</span></div>
    <div class="auth-sub">Buat akun baru, gratis.</div>
    <div class="field"><label>Nama Lengkap</label><input type="text" id="displayName" placeholder="Nama kamu"/></div>
    <div class="field"><label>Username</label><input type="text" id="username" placeholder="huruf kecil, tanpa spasi"/></div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="email@kamu.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Min 6 karakter"/></div>
    <button class="btn-primary" id="btn">Daftar</button>
    <div class="auth-link">Udah punya akun? <a href="/login">Login</a></div>
  </div>
</div>
<footer class="credit-footer">Public Code by Yamzzdev &nbsp;·&nbsp; TikTok @ymzzzoff</footer>
<script src="/js/api.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
